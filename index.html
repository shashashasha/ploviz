    :root {

      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      flex: 1;
    }
    .header-badge {
      font-size: 0.65rem;
      font-weight: 400;
      color: var(--text-muted);
      background: rgba(255,255,255,0.08);

      padding: 2px 8px;

      flex: 1;
      display: flex;
      overflow: hidden;

      color: var(--text-muted);
      margin-bottom: 0.55rem;

      display: flex;
      flex-direction: column;
      gap: 2px;

      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.75rem;
      cursor: pointer;
      padding: 3px 4px;
      border-radius: 4px;
      transition: background 0.1s;
      user-select: none;

      width: 13px; height: 13px;
      accent-color: var(--text);
      cursor: pointer;
      flex-shrink: 0;
    }

      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .filter-item span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .btn-load {
      display: block;
      text-align: center;
      background: var(--text);
      color: var(--bg);
      padding: 0.45rem 0.75rem;
      border-radius: var(--radius);
      font-size: 0.72rem;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      border: none;
      width: 100%;
      transition: opacity 0.15s;

    .btn-load-wrap { padding: 0.75rem 0.9rem; }

    .canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: var(--bg);
    }
    #main-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .prog-label {
      font-family: 'Poppins', sans-serif;
      pointer-events: none;
      dominant-baseline: middle;
      text-anchor: middle;
    }

    .artifact {
      cursor: pointer;
      transition: r 0.1s;
    }

      position: absolute;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.8rem 0.95rem;
      max-width: 290px;
      min-width: 200px;
      font-size: 0.75rem;
      line-height: 1.5;
      pointer-events: none;

      display: none;

    .tt-meta    { font-size: 0.68rem; color: var(--text-muted); margin-bottom: 6px; }
    .tt-divider { border: none; border-top: 1px solid var(--border); margin: 6px 0; }

      font-size: 0.71rem;
      color: #444;

      margin-bottom: 6px;

      font-size: 10px;

/* ═══════════════════════════════════════════════════════════
   COLOR SYSTEM
   ═══════════════════════════════════════════════════════════ */
const PLO_COLORS = {
  plo1: '#4e8a62',   // green  — Environmental
  plo2: '#4872a4',   // blue   — Material
  plo3: '#b05c3a',   // terracotta — Equity
  plo4: '#7659a0'    // purple — Systems
};

function ploColor(ploId) { return PLO_COLORS[ploId] || '#888'; }

function nodeColor(d) {
  if (d.type === 'plo') return PLO_COLORS[d.id] || '#888';
  const primaryPlo = (d.plos && d.plos[0]) || 'plo1';
  const base = d3.color(PLO_COLORS[primaryPlo] || '#888');
  if (d.type === 'class')         return d3.interpolateRgb(base, '#777')(0.3);
  if (d.type === 'manifestation') return d3.interpolateRgb(base, '#fff')(0.35);
  return '#888';
}

// Artifact color: a slightly brighter version of their class's program color
const CLASS_COLORS = {};
function initClassColors() {
  PROGRAM_DATA.classes.forEach(c => {
    const primaryPlo = c.plos[0];
    const base = d3.color(PLO_COLORS[primaryPlo] || '#888');
    CLASS_COLORS[c.id] = d3.interpolateRgb(base, '#fff')(0.15);
  });
}

function classColor(classId) { return CLASS_COLORS[classId] || '#888'; }

function nodeRadius(d) {
  if (d.type === 'plo')           return 28;
  if (d.type === 'class')         return 18;
  if (d.type === 'manifestation') return 13;
  return 7;
}

/* ═══════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════ */
const state = {
  visibleClasses:        new Set(PROGRAM_DATA.classes.map(c => c.id)),
  visibleAuthors:        new Set(),
  allArtifacts:          [],
  activeManifestationId: null   // ID of currently pinned manifestation, or null
};

// D3 globals
let svg, svgWidth, svgHeight;
let sim1, sim2;
let progLinkSel, progNodeSel, artNodeSel;
let _programNodes = [], _programLinks = [], _manifestationNodes = [];
let _artifactNodes = [];

/* ═══════════════════════════════════════════════════════════
   DATA PROCESSING
   ═══════════════════════════════════════════════════════════ */
const SCORE_COLS = [
  'score_slowness','score_material','score_environmental_crisis',
  'score_natural_world','score_equitable_design','score_stewardship',
  'score_more_than_human'
];
const REQUIRED_COLS = ['author','thesis_title','class','paragraph',...SCORE_COLS];

function processData(rows, merge = false) {
  const coerced = rows.map((r, i) => {
    const a = { ...r, _uid: merge ? state.allArtifacts.length + i : i };
    SCORE_COLS.forEach(col => { a[col] = +(r[col]) || 0; });
    return a;
  });

  if (merge) {
    // Deduplicate by author + paragraph prefix
    const existing = new Set(
      state.allArtifacts.map(a => `${a.author}||${a.paragraph.slice(0,60)}`)
    );
    const fresh = coerced.filter(a =>
      !existing.has(`${a.author}||${a.paragraph.slice(0,60)}`)
    );
    state.allArtifacts = [...state.allArtifacts, ...fresh];
    fresh.forEach(a => state.visibleAuthors.add(a.author));
    // Add any new classes to visible set
    fresh.forEach(a => { if (a.class) state.visibleClasses.add(a.class); });
  } else {
    state.allArtifacts = coerced;
    const authors = [...new Set(coerced.map(a => a.author))];
    authors.forEach(a => state.visibleAuthors.add(a));
  }
}

function getVisibleArtifacts() {
  return state.allArtifacts.filter(a =>
    state.visibleClasses.has(a.class) &&
    state.visibleAuthors.has(a.author)
  );
}

/* ═══════════════════════════════════════════════════════════
   SVG FILTERS
   ═══════════════════════════════════════════════════════════ */
function addSvgFilters() {
  const defs = svg.append('defs');
  const f = defs.append('filter').attr('id', 'node-shadow')
    .attr('x', '-30%').attr('y', '-30%').attr('width', '160%').attr('height', '160%');
  f.append('feDropShadow')
    .attr('dx', 0).attr('dy', 1)
    .attr('stdDeviation', 3)
    .attr('flood-color', 'rgba(0,0,0,0.18)');
}

/* ═══════════════════════════════════════════════════════════
   SVG SETUP
   ═══════════════════════════════════════════════════════════ */
function setupSVG() {
  const wrap = document.getElementById('canvas-wrap');
  svgWidth  = wrap.clientWidth;
  svgHeight = wrap.clientHeight;

  svg = d3.select('#main-svg')
    .attr('width', svgWidth)
    .attr('height', svgHeight);

  svg.append('g').attr('id', 'layer-prog-links');
  svg.append('g').attr('id', 'layer-art-nodes');   // artifacts UNDER program nodes
  svg.append('g').attr('id', 'layer-prog-nodes');   // program nodes always on top
  svg.append('g').attr('id', 'layer-legend');

  // Click/tap on empty canvas clears any active manifestation highlight
  svg.on('click.clearHighlight touchend.clearHighlight', (event) => {
    if (event.target === svg.node()) clearManifestationHighlight();
  });

  // Resize observer — re-pin PLOs to new quadrant positions on resize
  new ResizeObserver(() => {
    const w = wrap.clientWidth, h = wrap.clientHeight;
    if (Math.abs(w - svgWidth) < 2 && Math.abs(h - svgHeight) < 2) return;
    svgWidth = w; svgHeight = h;
    svg.attr('width', svgWidth).attr('height', svgHeight);
    if (sim1) {
      sim1.nodes()
        .filter(n => n.type === 'plo')
        .forEach(n => {
          const pos = ploQuadrantPos(n.id);
          n.fx = pos.x; n.fy = pos.y;
          n.x  = pos.x; n.y  = pos.y;
        });
      sim1.alpha(0.2).restart();
    }
    renderLegend(); // legend is positioned relative to svgWidth
  }).observe(wrap);
}

/* ═══════════════════════════════════════════════════════════
   CUSTOM FORCES
   ═══════════════════════════════════════════════════════════ */
// Soft boundary repulsion — keeps nodes from going off-screen
// Uses initialize() so nodes are captured properly (no `this` dependency)
function boundaryForce(getWidth, getHeight, padding) {
  let _nodes = [];
  function force(alpha) {
    const W = getWidth(), H = getHeight();
    const strength = 0.18 * alpha;
    _nodes.forEach(n => {
      const r = (n.type ? nodeRadius(n) : 8) + padding;
      if (n.x < r)       n.vx += (r - n.x) * strength;
      if (n.x > W - r)   n.vx -= (n.x - (W - r)) * strength;
      if (n.y < r)       n.vy += (r - n.y) * strength;
      if (n.y > H - r)   n.vy -= (n.y - (H - r)) * strength;
    });
  }
  force.initialize = function(nodes) { _nodes = nodes; };
  return force;
}

function customAttractionForce(manifestationNodes) {
  let _nodes = [];
  function force(alpha) {
    const ATTRACT_K = 0.18 * Math.min(1, (svgWidth * svgHeight) / (900 * 600));
    _nodes.forEach(artifact => {
      let totalScore = 0;
      manifestationNodes.forEach(m => { totalScore += artifact[m.id] || 0; });

      manifestationNodes.forEach(mNode => {
        if (mNode.x == null || mNode.y == null) return;
        const score = artifact[mNode.id] || 0;
        if (score <= 0) return;

        const weight  = score / 100;
        const weight2 = weight * weight;  // squared curve: high scores pull much harder

        const dx   = mNode.x - artifact.x;
        const dy   = mNode.y - artifact.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;

        // Target orbit distance — high scorers pulled tight, low scorers loosely nudged
        // score=100 → ~10px, score=70 → ~14px, score=50 → ~22px, score=20 → ~42px
        const targetDist = 5 + 40 * (1 - weight) * (1 - weight);

        // Spring: positive tension pulls in, negative pushes out (orbit at targetDist)
        const tension = (dist - targetDist) / dist;

        const s = tension * weight2 * ATTRACT_K * alpha;
        artifact.vx += dx * s;
        artifact.vy += dy * s;
      });

      // Artifacts with no scores at all: gentle pull toward canvas center
      if (totalScore === 0) {
        const cx = svgWidth * 0.5, cy = svgHeight * 0.5;
        artifact.vx += (cx - artifact.x) * 0.002 * alpha;
        artifact.vy += (cy - artifact.y) * 0.002 * alpha;
      }
    });
  }
  force.initialize = function(nodes) { _nodes = nodes; };
  return force;
}

/* ═══════════════════════════════════════════════════════════
   PLO QUADRANT POSITIONS — computed from current viewport
   ═══════════════════════════════════════════════════════════ */
const PLO_OFFSETS = { plo1: [-1,-1], plo2: [1,-1], plo3: [-1,1], plo4: [1,1] };

function ploQuadrantPos(ploId) {
  // Program graph lives in left ~38% of canvas, vertically centred
  const cx = svgWidth  * 0.28;
  const cy = svgHeight * 0.50;
  const rx = Math.min(svgWidth  * 0.16, 130); // horizontal radius
  const ry = Math.min(svgHeight * 0.28, 150); // vertical radius
  const o  = PLO_OFFSETS[ploId];
  if (!o) return { x: cx, y: cy };
  return { x: cx + o[0] * rx, y: cy + o[1] * ry };
}

/* ═══════════════════════════════════════════════════════════
   SIMULATION 1 — Program Graph
   PLOs are PINNED at quadrant positions (fx/fy).
   Classes and Manifestations float around them via force.
   ═══════════════════════════════════════════════════════════ */
function buildProgramSimulation(visibleClasses) {
  const ploNodes = PROGRAM_DATA.plos.map(p => ({ ...p, type: 'plo' }));
  const classNodes = PROGRAM_DATA.classes
    .filter(c => visibleClasses.has(c.id))
    .map(c => ({ ...c, type: 'class' }));
  const manifestationNodes = PROGRAM_DATA.manifestations
    .filter(m => m.classes.some(cid => visibleClasses.has(cid)))
    .map(m => ({ ...m, type: 'manifestation' }));

  const nodes = [...ploNodes, ...classNodes, ...manifestationNodes];
  const nodeById = new Map(nodes.map(n => [n.id, n]));

  // ── Pin PLO nodes to quadrant positions ──────────────────
  ploNodes.forEach(n => {
    const pos = ploQuadrantPos(n.id);
    n.x  = pos.x;  n.y  = pos.y;
    n.fx = pos.x;  n.fy = pos.y;  // pinned — drag releases these
  });

  const links = [];
  classNodes.forEach(c =>
    c.plos.forEach(pid => {
      const src = nodeById.get(pid);
      if (src) links.push({ source: src, target: c, linkType: 'class' });
    })
  );
  manifestationNodes.forEach(m =>
    m.classes.forEach(cid => {
      const src = nodeById.get(cid);
      if (src) links.push({ source: src, target: m, linkType: 'manifestation' });
    })
  );

  // Helper: spawn position = centroid of a node's linked PLOs + small jitter
  function centroidSpawn(ploIds) {
    const positions = (ploIds || ['plo1']).map(pid => ploQuadrantPos(pid));
    const ax = positions.reduce((s, p) => s + p.x, 0) / positions.length;
    const ay = positions.reduce((s, p) => s + p.y, 0) / positions.length;
    return {
      x: ax + (Math.random() - 0.5) * 28,
      y: ay + (Math.random() - 0.5) * 28
    };
  }

  // Preserve positions for non-PLO nodes that already existed
  if (sim1) {
    const oldById = new Map(sim1.nodes().filter(n => n.type !== 'plo').map(n => [n.id, n]));
    [...classNodes, ...manifestationNodes].forEach(n => {
      const old = oldById.get(n.id);
      if (old) { n.x = old.x; n.y = old.y; n.vx = old.vx || 0; n.vy = old.vy || 0; }
      else {
        const sp = centroidSpawn(n.plos);
        n.x = sp.x; n.y = sp.y;
      }
    });
  } else {
    // First build — spawn each node near centroid of its linked PLOs
    [...classNodes, ...manifestationNodes].forEach(n => {
      const sp = centroidSpawn(n.plos);
      n.x = sp.x; n.y = sp.y;
    });
  }

  if (sim1) sim1.stop();

  // Link distance scales with viewport
  const vscale = Math.min(svgWidth, svgHeight) / 600;
  const classDist    = Math.max(50, Math.min(100, 90 * vscale));
  const manifestDist = Math.max(35, Math.min(70,  65 * vscale));

  sim1 = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links)
      .id(d => d.id)
      .distance(d => d.linkType === 'class' ? classDist : manifestDist)
      .strength(d => d.linkType === 'class' ? 0.7 : 0.6))
    .force('charge', d3.forceManyBody()
      // PLOs are pinned so charge only matters for classes/manifestations
      .strength(d => d.type === 'class' ? -60 : d.type === 'manifestation' ? -40 : 0))
    .force('collide', d3.forceCollide()
      .radius(d => nodeRadius(d) + 6)
      .strength(0.8))
    .force('boundary', boundaryForce(() => svgWidth, () => svgHeight, 10))
    .alphaDecay(0.02)
    .velocityDecay(0.45)
    .stop()   // prevent auto-start; caller is responsible for starting
    .on('tick', onTick);

  return { nodes, links, manifestationNodes };
}

/* ═══════════════════════════════════════════════════════════
   SIMULATION 2 — Artifacts
   ═══════════════════════════════════════════════════════════ */
function topManifestationFor(artifact, manifestationNodes) {
  let best = null, bestScore = -1;
  manifestationNodes.forEach(m => {
    const s = artifact[m.id] || 0;
    if (s > bestScore) { bestScore = s; best = m; }
  });
  return best;
}

function buildArtifactSimulation(visibleArtifacts, manifestationNodes) {
  const oldById = sim2
    ? new Map(sim2.nodes().map(n => [n._uid, { x: n.x, y: n.y, vx: n.vx, vy: n.vy }]))
    : new Map();

  visibleArtifacts.forEach(a => {
    const old = oldById.get(a._uid);
    if (old) {
      a.x = old.x; a.y = old.y; a.vx = old.vx; a.vy = old.vy;
    } else {
      const top = topManifestationFor(a, manifestationNodes);
      // Use manifestation's current position if available; otherwise scatter in right half
      const bx = (top?.x != null && top.x > 10) ? top.x : svgWidth * 0.6 + Math.random() * svgWidth * 0.3;
      const by = (top?.y != null) ? top.y : svgHeight * 0.2 + Math.random() * svgHeight * 0.6;
      a.x = bx + (Math.random() - 0.5) * 60;
      a.y = by + (Math.random() - 0.5) * 60;
    }
  });

  if (sim2) sim2.stop();

  sim2 = d3.forceSimulation(visibleArtifacts)
    .force('attract',   customAttractionForce(manifestationNodes))
    .force('collide',   d3.forceCollide(5).strength(0.75))
    .force('charge',    d3.forceManyBody().strength(-2))
    .force('boundary',  boundaryForce(() => svgWidth, () => svgHeight, 10))
    .alphaDecay(0.012)
    .velocityDecay(0.4)
    .stop()   // prevent auto-start; caller starts it
    .on('tick', onTick);

  return sim2;
}

/* ═══════════════════════════════════════════════════════════
   TICK HANDLER
   ═══════════════════════════════════════════════════════════ */
function onTick() {
  if (progLinkSel) {
    progLinkSel
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  }
  if (progNodeSel) {
    progNodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
  }
  if (artNodeSel) {
    artNodeSel.attr('cx', d => d.x).attr('cy', d => d.y);
  }
}

/* ═══════════════════════════════════════════════════════════
   DRAG
   ═══════════════════════════════════════════════════════════ */
function makeDrag(simulation) {
  return d3.drag()
    .on('start', (event, d) => {
      if (!event.active) simulation.alphaTarget(0.2).restart();
      if (sim2) sim2.alphaTarget(0.3).restart();
      d.fx = d.x; d.fy = d.y;
    })
    .on('drag', (event, d) => {
      d.fx = event.x; d.fy = event.y;
    })
    .on('end', (event, d) => {
      if (!event.active) simulation.alphaTarget(0);
      if (sim2) sim2.alphaTarget(0);
      // PLO nodes: re-pin at new dragged position; others: release
      if (d.type !== 'plo') {
        d.fx = null; d.fy = null;
      }
      // (PLO keeps d.fx = event.x from drag move — stays pinned where dropped)
    });
}

/* ═══════════════════════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════════════════════ */
function renderAll() {
  // ── Program Links ──────────────────────────────────────────
  progLinkSel = svg.select('#layer-prog-links')
    .selectAll('line.prog-link')
    .data(_programLinks, d => `${d.source.id}--${d.target.id}`)
    .join(
      enter => enter.append('line')
        .attr('class', 'prog-link')
        .attr('stroke', d => nodeColor(d.source))
        .attr('stroke-opacity', 0.25)
        .attr('stroke-width', d => d.linkType === 'class' ? 1.5 : 1),
      update => update,
      exit   => exit.transition().duration(250).attr('stroke-opacity', 0).remove()
    );

  // ── Program Nodes ──────────────────────────────────────────
  progNodeSel = svg.select('#layer-prog-nodes')
    .selectAll('g.prog-node')
    .data(_programNodes, d => d.id)
    .join(
      enter => {
        const g = enter.append('g')
          .attr('class', 'prog-node')
          .style('cursor', 'grab')
          .call(makeDrag(sim1));

        g.append('circle')
          .attr('r', d => nodeRadius(d))
          .attr('fill', d => nodeColor(d))
          .attr('fill-opacity', d => d.type === 'plo' ? 1 : 0.92)
          .attr('stroke', '#fff')
          .attr('stroke-width', d => d.type === 'plo' ? 3 : 2)
          .attr('filter', 'url(#node-shadow)');

        // PLO label — short abbreviation inside circle
        g.filter(d => d.type === 'plo')
          .append('text')
          .attr('class', 'prog-label')
          .attr('font-size', '8.5px')
          .attr('font-weight', '600')
          .attr('fill', '#fff')
          .text(d => d.id.toUpperCase());

        // Class label — small text below circle with subtle background
        g.filter(d => d.type === 'class')
          .append('text')
          .attr('class', 'prog-label')
          .attr('font-size', '7.5px')
          .attr('font-weight', '500')
          .attr('fill', '#222')
          .attr('dy', d => nodeRadius(d) + 10)
          .attr('paint-order', 'stroke')
          .attr('stroke', 'rgba(250,249,245,0.85)')
          .attr('stroke-width', '3px')
          .attr('stroke-linejoin', 'round')
          .text(d => d.title.length > 16 ? d.title.slice(0, 14) + '…' : d.title);

        // Manifestation label — italic, smaller
        g.filter(d => d.type === 'manifestation')
          .append('text')
          .attr('class', 'prog-label')
          .attr('font-size', '6.5px')
          .attr('fill', '#444')
          .attr('dy', d => nodeRadius(d) + 9)
          .attr('paint-order', 'stroke')
          .attr('stroke', 'rgba(250,249,245,0.85)')
          .attr('stroke-width', '3px')
          .attr('stroke-linejoin', 'round')
          .text(d => d.title.length > 16 ? d.title.slice(0, 14) + '…' : d.title);

        g.on('mouseover', showProgramTooltip)
         .on('mouseleave', hideTooltip);

        // Manifestation tap/click — toggle artifact highlight
        g.filter(d => d.type === 'manifestation')
          .style('cursor', 'pointer')
          .on('click.highlight touchend.highlight', (event, d) => {
            event.stopPropagation();
            if (state.activeManifestationId === d.id) {
              clearManifestationHighlight();
            } else {
              highlightArtifactsForManifestation(d.id);
            }
          });

        return g;
      },
      update => {
        update.select('circle')
          .attr('r', d => nodeRadius(d))
          .attr('fill', d => nodeColor(d));
        return update;
      },
      exit => exit.transition().duration(250).attr('opacity', 0).remove()
    );

  renderArtifactNodes();
  renderLegend();
  updateArtifactCount();
}

function renderArtifactNodes() {
  artNodeSel = svg.select('#layer-art-nodes')
    .selectAll('circle.artifact')
    .data(_artifactNodes, d => d._uid)
    .join(
      enter => enter.append('circle')
        .attr('class', 'artifact')
        .attr('r', 3.5)
        .attr('fill', d => classColor(d.class))
        .attr('fill-opacity', 0.7)
        .attr('stroke', 'none')
        .attr('cx', d => d.x || svgWidth * 0.65)
        .attr('cy', d => d.y || svgHeight / 2)
        .on('mouseover', showArtifactTooltip)
        .on('mouseleave', (event, d) => {
          if (state.activeManifestationId) {
            // Restore this artifact to the manifestation-highlight state
            const mId = state.activeManifestationId;
            const scored = (d[mId] || 0) > 0;
            d3.select(event.currentTarget)
              .attr('r',            scored ? 5    : 3.5)
              .attr('fill-opacity', scored ? 1    : 0.1)
              .attr('stroke',       scored ? classColor(d.class) : 'none');
            // Restore prog nodes to manifestation-highlight state (not full default)
            d3.selectAll('g.prog-node').select('circle')
              .attr('fill-opacity', nd => {
                if (nd.type === 'plo')   return 0.35;
                if (nd.type === 'class') return 0.2;
                return nd.id === mId ? 1 : 0.1;
              })
              .attr('stroke-width', nd => nd.id === mId ? 4 : nd.type === 'plo' ? 3 : 2);
          } else {
            d3.select(event.currentTarget)
              .attr('r', 3.5)
              .attr('stroke', 'none')
              .attr('fill-opacity', 0.7);
            restoreProgNodes();
          }
          hideTooltip();
        }),
      update => update.attr('fill', d => classColor(d.class)),
      exit   => exit.transition().duration(180)
        .attr('r', 0)
        .attr('fill-opacity', 0)
        .remove()
    );
}

function renderLegend() {
  const layer = svg.select('#layer-legend');
  layer.selectAll('*').remove();

  const classes = PROGRAM_DATA.classes.filter(c => state.visibleClasses.has(c.id));
  if (!classes.length) return;

  const rowH = 18, padX = 12, padY = 10;
  const boxH = padY * 2 + classes.length * rowH;
  const boxW = 170;
  const bx = svgWidth - boxW - 12;
  const by = 12;

  layer.append('rect')
    .attr('x', bx).attr('y', by)
    .attr('width', boxW).attr('height', boxH)
    .attr('rx', 6)
    .attr('fill', 'rgba(250,249,245,0.9)')
    .attr('stroke', '#e2dfd4')
    .attr('stroke-width', 1);

  classes.forEach((c, i) => {
    const gy = by + padY + i * rowH + rowH / 2;
    layer.append('circle')
      .attr('cx', bx + padX + 5)
      .attr('cy', gy)
      .attr('r', 5)
      .attr('fill', classColor(c.id))
      .attr('fill-opacity', 0.85);
    layer.append('text')
      .attr('class', 'legend-text')
      .attr('x', bx + padX + 14)
      .attr('y', gy)
      .text(c.title.length > 22 ? c.title.slice(0, 20) + '…' : c.title)
      .attr('font-size', '9px')
      .attr('fill', '#141413')
      .attr('dominant-baseline', 'middle');
  });
}

function updateArtifactCount() {
  document.getElementById('artifact-count').textContent =
    `${_artifactNodes.length} artifact${_artifactNodes.length !== 1 ? 's' : ''}`;
}

/* ═══════════════════════════════════════════════════════════
   SIMULATION STARTUP
   Runs a synchronous warm-up so nodes have positions on first
   paint, then hands off to async requestAnimationFrame ticks.
   ═══════════════════════════════════════════════════════════ */
function startSimulations(includeProgram = true) {
  if (includeProgram) {
    // Warm-up: run 120 ticks synchronously so positions are set before first paint
    sim1.alpha(1);
    for (let i = 0; i < 120; i++) sim1.tick();
    // Apply positions to DOM immediately
    if (progLinkSel) {
      progLinkSel
        .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    }
    if (progNodeSel) progNodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
    // Continue async from where warm-up left off
    sim1.alpha(0.4).restart();
  }

  // Artifact sim: warm-up then continue async
  sim2.alpha(1);
  for (let i = 0; i < 60; i++) sim2.tick();
  if (artNodeSel) artNodeSel.attr('cx', d => d.x).attr('cy', d => d.y);
  sim2.alpha(0.5).restart();
}

/* ═══════════════════════════════════════════════════════════
   FILTER ORCHESTRATION
   ═══════════════════════════════════════════════════════════ */
function updateFilters(authorOnly = false) {
  if (!authorOnly) {
    const { nodes, links, manifestationNodes } = buildProgramSimulation(state.visibleClasses);
    _programNodes      = nodes;
    _programLinks      = links;
    _manifestationNodes = manifestationNodes;
  }

  const visible = getVisibleArtifacts();
  buildArtifactSimulation(visible, _manifestationNodes);
  _artifactNodes = visible;

  renderAll();

  startSimulations(!authorOnly);
}

/* ═══════════════════════════════════════════════════════════
   SIDEBAR
   ═══════════════════════════════════════════════════════════ */
function renderSidebar() {
  renderClassFilters();
  renderAuthorFilters();
}

function renderClassFilters() {
  const container = document.getElementById('class-filters');
  container.innerHTML = '';
  PROGRAM_DATA.classes.forEach(c => {
    const label = document.createElement('label');
    label.className = 'filter-item';

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = state.visibleClasses.has(c.id);
    cb.dataset.classId = c.id;
    cb.addEventListener('change', e => {
      if (e.target.checked) state.visibleClasses.add(c.id);
      else state.visibleClasses.delete(c.id);
      updateFilters(false);
    });

    const swatch = document.createElement('span');
    swatch.className = 'swatch';
    swatch.style.background = classColor(c.id);

    const name = document.createElement('span');
    name.textContent = c.title;

    label.append(cb, swatch, name);
    container.appendChild(label);
  });
}

function renderAuthorFilters() {
  const container = document.getElementById('author-filters');
  container.innerHTML = '';
  const authors = [...new Set(state.allArtifacts.map(a => a.author))].sort();
  authors.forEach(author => {
    const label = document.createElement('label');
    label.className = 'filter-item';

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = state.visibleAuthors.has(author);
    cb.dataset.author = author;
    cb.addEventListener('change', e => {
      if (e.target.checked) state.visibleAuthors.add(author);
      else state.visibleAuthors.delete(author);
      updateFilters(true);
    });

    const name = document.createElement('span');
    name.textContent = author;

    label.append(cb, name);
    container.appendChild(label);
  });
}

/* ═══════════════════════════════════════════════════════════
   TOOLTIPS
   ═══════════════════════════════════════════════════════════ */
const tooltipEl = document.getElementById('tooltip');

function positionTooltip(event) {
  const wrap = document.getElementById('canvas-wrap');
  const rect = wrap.getBoundingClientRect();
  const ttW = 290, ttH = tooltipEl.offsetHeight || 180;
  const margin = 14;
  let left = event.clientX - rect.left + margin;
  let top  = event.clientY - rect.top  + margin;
  if (left + ttW > rect.width  - 6) left = event.clientX - rect.left - ttW - margin;
  if (top  + ttH > rect.height - 6) top  = event.clientY - rect.top  - ttH - margin;
  tooltipEl.style.left = Math.max(0, left) + 'px';
  tooltipEl.style.top  = Math.max(0, top)  + 'px';
}

function highlightArtifactsForManifestation(mId) {
  state.activeManifestationId = mId;
  d3.selectAll('circle.artifact')
    .attr('r',            d => (d[mId] || 0) > 0 ? 5    : 3.5)
    .attr('fill-opacity', d => (d[mId] || 0) > 0 ? 1    : 0.1)
    .attr('stroke',       d => (d[mId] || 0) > 0 ? classColor(d.class) : 'none')
    .attr('stroke-width', 1.5);
  d3.selectAll('g.prog-node').select('circle')
    .attr('fill-opacity', nd => {
      if (nd.type === 'plo')   return 0.35;
      if (nd.type === 'class') return 0.2;
      return nd.id === mId ? 1 : 0.1;
    })
    .attr('stroke-width', nd => nd.id === mId ? 4 : nd.type === 'plo' ? 3 : 2);
}

function clearManifestationHighlight() {
  state.activeManifestationId = null;
  d3.selectAll('circle.artifact')
    .attr('r',            3.5)
    .attr('fill-opacity', 0.7)
    .attr('stroke',       'none');
  restoreProgNodes();
}

function restoreProgNodes() {
  d3.selectAll('g.prog-node').select('circle')
    .attr('fill-opacity', nd => nd.type === 'plo' ? 1 : 0.92)
    .attr('stroke-width', nd => nd.type === 'plo' ? 3 : 2);
}

function showArtifactTooltip(event, d) {
  d3.select(event.currentTarget)
    .attr('r', 5)
    .attr('stroke', classColor(d.class))
    .attr('stroke-width', 2)
    .attr('fill-opacity', 1);

  // Highlight manifestation nodes with a non-zero score; dim everything else
  const scoredIds = new Set(
    PROGRAM_DATA.manifestations
      .filter(m => (d[m.id] || 0) > 0)
      .map(m => m.id)
  );
  d3.selectAll('g.prog-node').select('circle')
    .attr('fill-opacity', nd => {
      if (nd.type === 'plo') return 0.35;
      if (nd.type === 'class') return 0.2;
      return scoredIds.has(nd.id) ? 1 : 0.1;
    })
    .attr('stroke-width', nd =>
      nd.type === 'manifestation' && scoredIds.has(nd.id) ? 4 : nd.type === 'plo' ? 3 : 2
    );

  const scores = PROGRAM_DATA.manifestations
    .map(m => ({ title: m.title, score: d[m.id] || 0, color: ploColor(m.plos[0]) }))
    .filter(s => s.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 4);

  const excerpt = (d.paragraph || '').trim();
  const classTitle = PROGRAM_DATA.classes.find(c => c.id === d.class)?.title || d.class;

  tooltipEl.innerHTML = `
    <div class="tt-title">${d.author}</div>
    <div class="tt-meta">${classTitle} &nbsp;·&nbsp; ${d.thesis_title}</div>
    <hr class="tt-divider">
    <div class="tt-excerpt">${excerpt}</div>
    ${scores.length ? `
      <hr class="tt-divider">
      <div class="tt-scores-label">Top Manifestation Scores</div>
      ${scores.map(s => `
        <div class="score-row">
          <span class="score-name">${s.title}</span>
          <div class="score-track">
            <div class="score-fill" style="width:${s.score}%;background:${s.color}"></div>
          </div>
          <span class="score-val" style="color:${s.color}">${s.score}</span>
        </div>`).join('')}` : ''}`;

  tooltipEl.classList.add('visible');
  positionTooltip(event);
}

function showProgramTooltip(event, d) {
  const typeLabel = { plo: 'Program Learning Outcome', class: 'Class', manifestation: 'Manifestation' }[d.type] || d.type;
  tooltipEl.innerHTML = `
    <div class="tt-title">${d.title}</div>
    <div class="tt-meta">${typeLabel}</div>`;
  tooltipEl.classList.add('visible');
  positionTooltip(event);
}

function hideTooltip() {
  tooltipEl.classList.remove('visible');
}

/* ═══════════════════════════════════════════════════════════
   FILE PICKER
   ═══════════════════════════════════════════════════════════ */
document.getElementById('csv-input').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  const text = await file.text();
  const rows = d3.csvParse(text);
  if (!rows.length) { alert('CSV appears empty.'); return; }

  const missing = REQUIRED_COLS.filter(c => !(c in rows[0]));
  if (missing.length) {
    alert(`CSV is missing required columns:\n${missing.join(', ')}\n\nExpected:\n${REQUIRED_COLS.join(', ')}`);
    return;
  }

  processData(rows, true);
  renderSidebar();
  updateFilters(false);
  e.target.value = '';
});

/* ═══════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════ */
async function init() {
  initClassColors();

  let csvText = null;
  try {
    const res = await fetch('./data/artifacts.csv');
    if (res.ok) csvText = await res.text();
  } catch (_) { /* file:// protocol — use embedded */ }

  const rows = d3.csvParse(csvText ?? EMBEDDED_CSV);
  processData(rows, false);

  setupSVG();
  addSvgFilters();
  renderSidebar();

  // Build initial program simulation first, then artifacts
  const { nodes, links, manifestationNodes } = buildProgramSimulation(state.visibleClasses);
  _programNodes       = nodes;
  _programLinks       = links;
  _manifestationNodes = manifestationNodes;

  const visible = getVisibleArtifacts();
  buildArtifactSimulation(visible, _manifestationNodes);
  _artifactNodes = visible;

  renderAll();
  startSimulations();
}

init();
</script>
